
<!doctype html>
<html lang="pt-PT">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Sala Secreta — Logs do Sistema • YUNO IA 10.3</title>

    <style>
        body {
            background: #000;
            font-family: "Inter", sans-serif;
            color: #00eaff;
            margin: 0;
            padding: 0;
        }

        header {
            background: #020202;
            border-bottom: 1px solid #00eaff55;
            padding: 15px 25px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #00eaff;
            text-shadow: 0 0 10px #00eaff;
        }

        .container {
            padding: 20px;
        }

        .box {
            background: #0a0a0a;
            border: 1px solid #00eaff55;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            box-shadow: 0 0 15px #00eaff33;
        }

        .logs-area {
            width: 100%;
            height: 500px;
            background: #000;
            color: #00eaff;
            border: 1px solid #00eaff33;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-line;
            font-family: monospace;
            border-radius: 6px;
            box-shadow: inset 0 0 12px #00eaff44;
        }

        button {
            background: #00eaff;
            color: #000;
            padding: 12px 18px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
            transition: 0.2s;
        }

        button:hover {
            background: #0088cc;
            color: #fff;
            box-shadow: 0 0 10px #00eaff;
        }

        .danger {
            background: #ff0066;
        }

        .danger:hover {
            background: #cc0055;
            box-shadow: 0 0 10px #ff0066;
        }
    </style>
</head>

<body>

<header>🔐 Sala Secreta — Logs do Sistema (Arena 10.3)</header>

<div class="container">

    <div class="box">
        <h2>📜 Logs Internos</h2>

        <div id="logsBox" class="logs-area">
            A carregar logs...
        </div>

        <button onclick="loadLogs()">Atualizar Logs</button>
        <button class="danger" onclick="clearLogs()">Limpar Logs</button>
    </div>

</div>

<script>
async function loadLogs() {
    const box = document.getElementById("logsBox");
    box.innerHTML = "A carregar...";

    try {
        const response = await fetch("/api/admin/logs");
        const data = await response.json();

        if (!data.logs || data.logs.length === 0) {
            box.innerHTML = "Sem logs registados.";
            return;
        }

        box.innerHTML = data.logs.join("\n");
        box.scrollTop = box.scrollHeight;

    } catch (err) {
        box.innerHTML = "⚠ Erro ao carregar logs.";
        console.error(err);
    }
}

async function clearLogs() {
    const confirmar = confirm("Tens a certeza que queres APAGAR TODOS os logs?");
    if (!confirmar) return;

    try {
        await fetch("/api/admin/clear-logs", { method: "POST" });
        loadLogs();
    } catch (err) {
        alert("Erro ao limpar logs.");
        console.error(err);
    }
}

// Carregar ao abrir a página
loadLogs();
</script>

</body>
</html>
